<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Poolroom App</title>

    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <style>
    /* RESET BÁSICO */
    body {
        background-color: #121212 !important;
        color: #fff !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* El contenedor debe ocupar el ancho y NO tener fondo gris */
    .container {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 10px !important;
        background-color: transparent !important; /* Eliminamos el fondo gris */
    }

    /* MÓVIL: Fuerza el flujo natural */
    @media (max-width: 768px) {
        .row { display: flex !important; flex-wrap: wrap !important; margin: 0 !important; }
        .col-md-4, .col-md-3 { width: 100% !important; flex: 0 0 100% !important; }
    }
</style>

    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='LogoInicio.png') }}?v=2">

    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='LogoInicio.png') }}?v=2">
</head>
<body>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/static/sw.js")
                    .then(reg => console.log("Service Worker registrado con éxito", reg))
                    .catch(err => console.log("Error al registrar el Service Worker", err));
            });
        }
    </script>
</body>

</body>
</html>
