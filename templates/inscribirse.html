<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #ffffff; padding: 40px; }
        .card { background: #1a1a1a; border: 1px solid #333; color: #ffffff; max-width: 500px; margin: auto; padding: 30px; border-radius: 12px; }
        label { color: #ffffff !important; margin-bottom: 5px; display: block; }
        h2 { color: #ffffff !important; }
        p { color: #ffffff !important; }
        input { background: #262626 !important; border: 1px solid #444 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Inscribirse a {{ competicion.nombre }}</h2>
        <p>Por favor, realiza el ingreso en el IBAN: <strong>{{ competicion.iban }}</strong></p>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Nombre completo del jugador:</label>
                {% if session.get('modo_visual') == 'invitado' or not user %}
                    <input type="text" name="nombre_jugador_invitado" class="form-control" placeholder="Escribe tu Nombre y Apellidos" required>
                {% else %}
                    <input type="text" name="nombre_jugador" class="form-control" value="{{ user.nombre }}" readonly>
                {% endif %}
            </div>

            <div class="mb-3">
                <label>Sube tu comprobante de pago:</label>
                <input type="file" name="comprobante" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-2">Confirmar inscripción</button>

            <a href="/panel_jugador" class="btn btn-outline-secondary w-100">Cancelar y Volver</a>
        </form>
    </div>
</body>
</html>
