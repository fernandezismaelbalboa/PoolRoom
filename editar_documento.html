<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Documento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
    <div class="container card bg-secondary p-4" style="max-width: 500px;">
        <h3>Editar Documento: {{ doc.titulo }}</h3>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Nuevo Título:</label>
                <input type="text" name="titulo" value="{{ doc.titulo }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Cambiar PDF (Opcional):</label>
                <input type="file" name="archivo" class="form-control" accept="application/pdf">
                <small class="text-white-50">Solo selecciona si quieres reemplazar el archivo actual.</small>
            </div>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{{ url_for('panel_admin', _anchor='clasificaciones') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
